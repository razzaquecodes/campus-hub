<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Hub | BBIT</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; background-color: #0A0A0B; color: #E2E8F0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .container { max-width: 560px; padding: 2rem; }
        h1 { font-size: 2.5rem; font-weight: 800; color: #FFFFFF; letter-spacing: -0.05em; margin-bottom: 0.5rem; }
        p { font-size: 1.125rem; color: #94A3B8; line-height: 1.6; margin-bottom: 2rem; }
        .button-group { display: flex; flex-direction: column; gap: 1rem; align-items: center; }
        a.button { display: inline-block; text-decoration: none; font-weight: 600; border-radius: 9999px; padding: 0.75rem 1.5rem; transition: transform 0.2s, background-color 0.2s; }
        .primary { background-color: #4F46E5; color: #FFFFFF; }
        .secondary { background-color: rgba(255, 255, 255, 0.1); color: #E2E8F0; border: 1px solid rgba(255, 255, 255, 0.2); }
        a.button:hover { transform: translateY(-2px); }
        .primary:hover { background-color: #6366F1; }
        .secondary:hover { background-color: rgba(255, 255, 255, 0.15); }
        @media (min-width: 640px) {
            .button-group { flex-direction: row; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Campus Hub</h1>
        <p>The official, next-generation student portal for Budge Budge Institute of Technology, designed for performance and privacy.</p>
        <div class="button-group">
            <a href="/app" class="button primary">Launch Web App</a>
            <a href="/CampusHub.apk" class="button secondary">Download for Android</a>
        </div>
    </div>
</body>
</html>
